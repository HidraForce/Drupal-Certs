services:
  firebase:
    build:
      context: ./infra/firebase
    ports:
      - "4000:4000"
      - "8080:8080"
      - "9099:9099"
    volumes:
      - firebase-data:/data
  quiz:
    build: ./services/quiz
    environment:
      PORT: 8081
      WEB_ORIGIN: http://localhost:4200
      FIREBASE_PROJECT_ID: drupal-study-lab
      FIREBASE_AUTH_EMULATOR_HOST: firebase:9099
      FIRESTORE_EMULATOR_HOST: firebase:8080
      ADMIN_EMAILS: admin@example.com
    ports: ["8081:8081"]
    depends_on: [firebase]
  progress:
    build: ./services/progress
    environment:
      PORT: 8082
      WEB_ORIGIN: http://localhost:4200
      FIREBASE_PROJECT_ID: drupal-study-lab
      FIREBASE_AUTH_EMULATOR_HOST: firebase:9099
      FIRESTORE_EMULATOR_HOST: firebase:8080
    ports: ["8082:8082"]
    depends_on: [firebase]
volumes:
  firebase-data:
